<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mausam Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-400 to-indigo-600 flex items-center justify-center min-h-screen">

    <div class="bg-white/20 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-96 text-center border border-white/30 text-white">
        <h1 class="text-3xl font-extrabold mb-6 tracking-tight">Weather App</h1>
        
        <form method="POST" class="space-y-4">
            <input type="text" name="city" placeholder="Enter City (e.g. Lahore)" required
                   class="w-full p-3 rounded-xl bg-white/10 border border-white/20 placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white text-white">
            <button type="submit" class="w-full bg-white text-indigo-600 font-bold p-3 rounded-xl hover:bg-opacity-90 transition transform active:scale-95">
                Check Weather
            </button>
        </form>

        {% if weather %}
            {% if weather.error %}
                <p class="mt-6 text-red-200 font-medium">⚠️ {{ weather.error }}</p>
            {% else %}
                <div class="mt-8 space-y-2 animate-fade-in">
                    <h2 class="text-2xl font-bold">{{ weather.city }}, {{ weather.country }}</h2>
                    <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@4x.png" alt="weather-icon" class="mx-auto w-32">
                    <p class="text-6xl font-black">{{ weather.temp }}°C</p>
                    <p class="text-lg capitalize opacity-90 italic">{{ weather.description }}</p>
                    
                    <div class="flex justify-between mt-6 text-sm bg-black/10 p-4 rounded-2xl">
                        <div>
                            <p class="opacity-70">Humidity</p>
                            <p class="font-bold">{{ weather.humidity }}%</p>
                        </div>
                        <div>
                            <p class="opacity-70">Wind Speed</p>
                            <p class="font-bold">{{ weather.wind }} m/s</p>
                        </div>
                    </div>
                </div>
            {% endif %}
        {% endif %}
    </div>

</body>
</html>
